<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Payroll Computation</h1>
        <form id="payrollForm" action="http://localhost:3000/process.php" method="POST" target="_blank">
            <label>Employee Name:</label>
            <input type="text" name="name" required>

            <label>Basic Salary:</label>
            <input type="number" name="basic" step="0.01" required>

            <label>Deductions:</label>
            <input type="number" name="deductions" step="0.01" required>

            <button type="submit">Generate Payslip</button>
        </form>
    </div>
</body>
</html>
