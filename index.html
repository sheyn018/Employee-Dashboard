<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Connect</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Animate a colorful rainbow background */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(270deg, 
        #ff0000, #ff9900, #33cc33, #00ccff, #9900cc, #ff3399, #ff0000);
      background-size: 1400% 1400%;
      animation: rainbowBG 20s ease infinite;
      font-family: Arial, sans-serif;
    }

    @keyframes rainbowBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background-color: rgba(0, 64, 128, 0.8);
      padding: 20px 0;
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    header .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: 600;
      transition: color 0.3s;
      font-size: 16px;
    }

    nav a:hover,
    nav a.active {
      color: #ffd700;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.9);
      margin: 40px auto;
      border-radius: 20px;
      max-width: 1000px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 20px;
      color: #004080;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }

    .hero p {
      font-size: 20px;
      max-width: 600px;
      margin: 0 auto 30px;
      color: #333;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: background 0.4s, transform 0.3s;
    }

    .btn:hover {
      background: linear-gradient(45deg, #0072ff, #00c6ff);
      transform: scale(1.1);
    }

    footer {
      background-color: rgba(44, 62, 80, 0.85);
      color: white;
      text-align: center;
      padding: 30px 0;
      font-size: 14px;
      margin-top: auto;
      box-shadow: 0 -4px 6px rgba(0,0,0,0.3);
    }

    footer .blockquote-footer {
      margin-top: 20px;
    }

    footer cite {
      display: inline-block;
      margin-top: 5px;
    }

  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo"><i><b>SEPTEM INC.</b></i></h1>
      <nav>
        <ul>
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="service.html">Services</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="admin-login.html" style="color: red;">Admin</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Empowering Your Workforce</h2>
      <p>Choose a job you love, and you will never have to work a day in your life.</p>
      <a href="login.html" class="btn">SIGN IN</a>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>2025 HR Connect. All rights reserved.</p>
      <p style="font-size: 10px; text-align: center;">&copy; 2025 Group BSIT 22029 (Rex Tyron)</p>
      <figure class="text-center">
        <blockquote class="blockquote">
          <p style="font-size: 10px;">BSIT 22029</p>
        </blockquote>
        <figcaption class="blockquote-footer" style="text-align: center;">
          <br>
          Group Members:
          <br>
          <cite>Rex Tyron Dianela</cite><br>
          <cite>Gerardo Ortencio</cite><br>
          <cite>Janna Acutin</cite><br>
          <cite>Averil Bianca B. Ligaya</cite><br>
          <cite>Justin Khirk A. Pacete</cite><br>
          <cite>Oliver M. Mediana</cite><br>
          <cite>Herminio M. Mediana Jr.</cite><br>
        </figcaption>
      </figure>
    </div>
  </footer>
</body>
</html>
