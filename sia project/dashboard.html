<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - HR Connect</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Rainbow Animated Background for the Body */
    body {
      background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 400% 400%;
      animation: gradientAnimation 10s ease infinite;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Different Background Colors for Each Table */
    .table-1 {
      background-color: lightblue; 
    }

    .table-2 {
      background-color: lightblue; 
    }

    .table-3 {
      background-color: lightblue; 
    }

    /* Table Animation for Cycling Different Colors */
    @keyframes tableAnimation1 {
      0% { background-color: rgba(255, 0, 0, 0.3); } /* Red */
      50% { background-color: rgba(255, 255, 0, 0.3); } /* Yellow */
      100% { background-color: rgba(255, 0, 0, 0.3); } /* Red */
    }

    @keyframes tableAnimation2 {
      0% { background-color: rgba(255, 165, 0, 0.3); } /* Orange */
      50% { background-color: rgba(0, 255, 0, 0.3); } /* Green */
      100% { background-color: rgba(255, 165, 0, 0.3); } /* Orange */
    }

    @keyframes tableAnimation3 {
      0% { background-color: rgba(255, 255, 0, 0.3); } /* Yellow */
      50% { background-color: rgba(0, 0, 255, 0.3); } /* Blue */
      100% { background-color: rgba(255, 255, 0, 0.3); } /* Yellow */
    }

    .btn-sm {
      padding: 5px 10px;
      margin-left: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .payroll-section {
      margin-top: 10px;
      font-size: 14px;
      color: green;
    }

    .input-salary {
      width: 100px;
    }

    .btn-logout {
      padding: 10px 20px;
      background-color: #ff4d4d;
      color: white;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn-logout:hover {
      background-color: #ff1a1a;
    }
  </style>
</head>
<body>
  <header><h1 style="text-align:center;">Employee Records</h1></header>

  <section class="dashboard">
    <div class="container">
      <h3>🧾 Active Records</h3>
      <table class="table-1" border="1" cellpadding="10" style="margin:auto;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Date</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Earnings</th> <!-- Earnings Column -->
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recordsTableBody"></tbody>
      </table>

      <br><br>
      <h3>📝 Employee Salary Requests</h3>
      <table class="table-2" border="1" cellpadding="10" style="margin:auto;">
        <thead>
          <tr>
            <th>Employee Name</th>
            <th>Requested Salary</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="employeeSalaryTableBody"></tbody>
      </table>

      <br><br>
      <h3>🗑️ Deleted Records</h3>
      <table class="table-3" border="1" cellpadding="10" style="margin:auto;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Position</th>
            <th>Date</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="deletedRecordsTableBody"></tbody>
      </table>

      <br><br>
      <center><a href="index.html" class="btn">Back to Home</a></center>

      <!-- Log Out Button -->
      <center>
        <button class="btn-logout" onclick="logOut()">Log Out</button>
      </center>
    </div>
  </section>

  <script>
    const isAdmin = localStorage.getItem("isAdmin");
    if (isAdmin !== "true") {
      alert("Access denied. Admins only.");
      window.location.href = "admin-login.html";
    }

    // Fetching employee records from localStorage
    let employeeRecords = JSON.parse(localStorage.getItem("employeeRecords")) || [];
    let deletedRecords = JSON.parse(localStorage.getItem("deletedRecords")) || [];
    let salaryRequests = JSON.parse(localStorage.getItem("salaryRequests")) || [];

    // Render Employee Records and Salary Requests
    function renderTables() {
  const tbody = document.getElementById("recordsTableBody");
  tbody.innerHTML = "";

  employeeRecords.forEach((record, index) => {
    // Retrieve the earnings from localStorage if it exists
    const earnings = record.earnings || localStorage.getItem("employeeEarnings");
    
    const earningsDisplay = earnings ? `$${parseFloat(earnings).toFixed(2)}` : "Not Available"; // Format earnings
    
    const row = document.createElement("tr");
    row.innerHTML = `  
      <td>${record.name}</td>
      <td>${record.position}</td>
      <td>${record.date}</td>
      <td>${record.timeIn}</td>
      <td>${record.timeOut || '-'}</td>
      <td>${earningsDisplay}</td> <!-- Earnings Column -->
      <td>
        <button class="btn-sm" onclick="deleteRecord(${index})">Delete</button>
      </td>
    `;
    tbody.appendChild(row);
  });

  renderSalaryRequests();
  renderDeletedRecords();
}


    // Render Salary Requests
    function renderSalaryRequests() {
      const tbody = document.getElementById("employeeSalaryTableBody");
      tbody.innerHTML = "";

      salaryRequests.forEach((request, index) => {
        const row = document.createElement("tr");
        row.innerHTML = ` 
          <td>${request.name}</td>
          <td>$${parseFloat(request.salary).toLocaleString()}</td>
          <td>${request.status || "Pending"}</td>
          <td>
            <select onchange="updateSalaryStatus(${index}, this.value)">
              <option value="Pending" ${request.status === "Pending" ? "selected" : ""}>Pending</option>
              <option value="Approved" ${request.status === "Approved" ? "selected" : ""}>Approved</option>
              <option value="Declined" ${request.status === "Declined" ? "selected" : ""}>Declined</option>
            </select>
            <button class="btn-sm" onclick="deleteSalaryRequest(${index})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Delete Salary Request and related profile if needed
    function deleteSalaryRequest(index) {
      const removedRequest = salaryRequests.splice(index, 1)[0];
      localStorage.setItem("salaryRequests", JSON.stringify(salaryRequests));

      // Optional: Also remove from profile.html data if exists
      let employeeProfiles = JSON.parse(localStorage.getItem("employeeProfiles")) || [];
      employeeProfiles = employeeProfiles.filter(profile => profile.name !== removedRequest.name);
      localStorage.setItem("employeeProfiles", JSON.stringify(employeeProfiles));

      renderSalaryRequests();
    }

    // Render Deleted Records
    function renderDeletedRecords() {
      const tbody = document.getElementById("deletedRecordsTableBody");
      tbody.innerHTML = "";

      deletedRecords.forEach((record, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${record.name}</td>
          <td>${record.position}</td>
          <td>${record.date}</td>
          <td>${record.timeIn}</td>
          <td>${record.timeOut || '-'}</td>
          <td>
            <button class="btn-sm" onclick="restoreRecord(${index})">Restore</button>
            <button class="btn-sm" onclick="permanentlyDeleteRecord(${index})">Delete Permanently</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    // Update Salary Status
    function updateSalaryStatus(index, newStatus) {
      salaryRequests[index].status = newStatus;
      localStorage.setItem("salaryRequests", JSON.stringify(salaryRequests));
      renderSalaryRequests();
    }

    // Delete Employee Record
    function deleteRecord(index) {
      const deletedRecord = employeeRecords.splice(index, 1)[0];
      deletedRecords.push(deletedRecord);
      localStorage.setItem("employeeRecords", JSON.stringify(employeeRecords));
      localStorage.setItem("deletedRecords", JSON.stringify(deletedRecords));
      renderTables();
    }

    // Restore Deleted Record
    function restoreRecord(index) {
      const restoredRecord = deletedRecords.splice(index, 1)[0];
      employeeRecords.push(restoredRecord);
      localStorage.setItem("employeeRecords", JSON.stringify(employeeRecords));
      localStorage.setItem("deletedRecords", JSON.stringify(deletedRecords));
      renderTables();
    }

    // Permanently Delete Record
    function permanentlyDeleteRecord(index) {
      deletedRecords.splice(index, 1);
      localStorage.setItem("deletedRecords", JSON.stringify(deletedRecords));
      renderTables();
    }

    // Log Out Function
    function logOut() {
      localStorage.removeItem("isAdmin");
      window.location.href = "index.html";
    }

    // Initial render of tables
    renderTables();
  </script>
</body>
</html>
