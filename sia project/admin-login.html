<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - HR Connect</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Basic styling for the back button */
    .back-home-btn {
      display: inline-block;
      margin-top: 20px;
      background-color: #f0f4f8;
      color: #004080;
      padding: 10px 20px;
      border: 1px solid #004080;
      border-radius: 5px;
      font-size: 16px;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
    }

    .back-home-btn:hover {
      background-color: #004080;
      color: white;
    }

    body {
    background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
    background-size: 400% 400%;
    animation: gradientAnimation 10s ease infinite;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  @keyframes gradientAnimation {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Basic styling for the back button */
  .back-home-btn {
    display: inline-block;
    margin-top: 20px;
    background-color: #f0f4f8;
    color: #004080;
    padding: 10px 20px;
    border: 1px solid #004080;
    border-radius: 5px;
    font-size: 16px;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
  }

  .back-home-btn:hover {
    background-color: #004080;
    color: white;
  }
  </style>
</head>
<body>
  <header><h1 style="text-align:center;">Admin Login</h1></header>

  <section class="login-section">
    <div class="container" style="text-align:center;">
      <form id="adminLoginForm">
        <input type="password" id="adminPassword" placeholder="Enter Admin Password" required />
        <br><br>
        <button type="submit" class="btn">Login</button>
      </form>
      
      <!-- Back Home Button -->
      <a href="index.html" class="back-home-btn">Back Home</a>
    </div>
  </section>

  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const enteredPassword = document.getElementById("adminPassword").value;

      // Simple admin password check
      const correctPassword = "admin123"; // <- you can change this!

      if (enteredPassword === correctPassword) {
        localStorage.setItem("isAdmin", "true");
        window.location.href = "dashboard.html";
      } else {
        alert("Incorrect password.");
      }
    });
  </script>
</body>
</html>
