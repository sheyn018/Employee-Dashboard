<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Budget Planning</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../css/modules.css">
</head>
<body>
    <!-- Nav Component -->
  <div id="navigation-container"></div>
<div class="container">
  <h2>💵 Budget Planning</h2>
  <form id="budgetForm">
    <label>Department</label>
    <input type="text" name="department" required>
    <label>Allocated Amount</label>
    <input type="number" step="0.01" name="allocated_amount" required>
    <label>Spent Amount</label>
    <input type="number" step="0.01" name="spent_amount">
    <label>Fiscal Year</label>
    <input type="text" name="fiscal_year" placeholder="2025" required>
    <button type="submit">Save Budget</button>
  </form>

  <h3>Budget Records</h3>
  <table id="budgetTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Department</th>
        <th>Allocated</th>
        <th>Spent</th>
        <th>Year</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

  <script src="../components/navigation.js"></script>
<script>
document.getElementById("budgetForm").addEventListener("submit", async function(e){
  e.preventDefault();
  let formData = new FormData(this);
  let res = await fetch("../api/api.php?action=add_budget", { method: "POST", body: formData });
  let data = await res.json();
  alert(data.message);
  loadData();
});

async function loadData(){
  let res = await fetch("../api/api.php?action=get_budget");
  let data = await res.json();
  let tbody = document.querySelector("#budgetTable tbody");
  tbody.innerHTML = "";
  data.data.forEach(row => {
    tbody.innerHTML += `<tr>
      <td>${row.id}</td>
      <td>${row.department}</td>
      <td>${row.allocated_amount}</td>
      <td>${row.spent_amount}</td>
      <td>${row.fiscal_year}</td>
    </tr>`;
  });
}
loadData();
</script>
</body>
</html>
