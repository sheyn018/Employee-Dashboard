<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Planning</title>
  <link rel="stylesheet" href="../css/modules.css">
  <link rel="stylesheet" href="../components/navigation.css">
</head>
<body>
  <!-- Navigation Component -->
  <div id="navigation-container"></div>
  
  <!-- Main Content -->
  <div class="container">
    <h2>💵 Budget Planning</h2>
    <form id="budgetForm">
      <label>Department</label>
      <input type="text" name="department" required>
      <label>Allocated Amount</label>
      <input type="number" step="0.01" name="allocated_amount" required>
      <label>Spent Amount</label>
      <input type="number" step="0.01" name="spent_amount">
      <label>Fiscal Year</label>
      <input type="text" name="fiscal_year" placeholder="2025" required>
      <button type="submit">Save Budget</button>
    </form>

    <h3>Budget Records</h3>
    <table id="budgetTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Department</th>
          <th>Allocated</th>
          <th>Spent</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Scripts -->
  <script src="../components/navigation.js"></script>
  <script>
    // Initialize navigation
    document.addEventListener('DOMContentLoaded', function() {
      NavigationComponent.init({
        containerId: 'navigation-container',
        menuType: 'admin',
        includeLogout: true,
        authCheck: true
      });
      
      // Set active navigation item
      NavigationComponent.setActiveNavItem('budget.html');
      
      // Load data
      loadData();
    });

    document.getElementById("budgetForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      try {
        const formData = new FormData(this);
        const response = await fetch("../api/api.php?action=add_budget", { 
          method: "POST", 
          body: formData 
        });
        const data = await response.json();
        alert(data.message);
        this.reset();
        loadData();
      } catch (error) {
        console.error('Error submitting form:', error);
        alert('Error saving budget record');
      }
    });

    async function loadData() {
      try {
        const response = await fetch("../api/api.php?action=get_budget");
        const data = await response.json();
        const tbody = document.querySelector("#budgetTable tbody");
        tbody.innerHTML = "";
        
        if (data.data && Array.isArray(data.data)) {
          data.data.forEach(row => {
            tbody.innerHTML += `<tr>
              <td>${row.id || ''}</td>
              <td>${row.department || ''}</td>
              <td>$${parseFloat(row.allocated_amount || 0).toFixed(2)}</td>
              <td>$${parseFloat(row.spent_amount || 0).toFixed(2)}</td>
              <td>${row.fiscal_year || ''}</td>
            </tr>`;
          });
        }
      } catch (error) {
        console.error('Error loading data:', error);
        const tbody = document.querySelector("#budgetTable tbody");
        tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>';
      }
    }
  </script>
</body>
</html>
