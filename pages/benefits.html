<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Benefits</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../css/modules.css">
</head>
<body>
  <!-- Nav Component -->
  <div id="navigation-container"></div>
<div class="container">
  <h2>💼 Employee Benefits</h2>
  <form id="benefitForm">
    <label>Employee ID</label>
    <input type="number" name="employee_id" required>
    <label>Benefit Type</label>
    <input type="text" name="benefit_type" required>
    <label>Description</label>
    <input type="text" name="description">
    <label>Amount</label>
    <input type="number" step="0.01" name="amount">
    <label>Start Date</label>
    <input type="date" name="start_date" required>
    <label>End Date</label>
    <input type="date" name="end_date">
    <button type="submit">Save Benefit</button>
  </form>

  <h3>Existing Benefits</h3>
  <table id="benefitsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Duration</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

  <script src="../components/navigation.js"></script>
<script>
document.getElementById("benefitForm").addEventListener("submit", async function(e){
  e.preventDefault();
  let formData = new FormData(this);
  let res = await fetch("../api/api.php?action=add_benefit", { method: "POST", body: formData });
  let data = await res.json();
  alert(data.message);
  loadData();
});

async function loadData(){
  let res = await fetch("../api/api.php?action=get_benefits");
  let data = await res.json();
  let tbody = document.querySelector("#benefitsTable tbody");
  tbody.innerHTML = "";
  data.data.forEach(row => {
    tbody.innerHTML += `<tr>
      <td>${row.id}</td>
      <td>${row.employee_id}</td>
      <td>${row.benefit_type}</td>
      <td>${row.amount}</td>
      <td>${row.start_date} to ${row.end_date}</td>
    </tr>`;
  });
}
loadData();
</script>
</body>
</html>
