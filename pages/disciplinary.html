<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disciplinary Actions</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../css/modules.css">
</head>
<body>
    <!-- Nav Component -->
  <div id="navigation-container"></div>
<div class="container">
  <h2>📋 Disciplinary Actions</h2>
  <form id="disciplinaryForm">
    <label>Employee ID</label>
    <input type="number" name="employee_id" required>
    <label>Case Type</label>
    <input type="text" name="case_type" required>
    <label>Description</label>
    <textarea name="description" required></textarea>
    <label>Action Taken</label>
    <input type="text" name="action_taken">
    <label>Date Reported</label>
    <input type="date" name="date_reported" required>
    <label>Status</label>
    <select name="status">
      <option value="Open">Open</option>
      <option value="Resolved">Resolved</option>
    </select>
    <button type="submit">Save Record</button>
  </form>

  <h3>Existing Records</h3>
  <table id="disciplinaryTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Case</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

  <script src="../components/navigation.js"></script>
<script>
document.getElementById("disciplinaryForm").addEventListener("submit", async function(e){
  e.preventDefault();
  let formData = new FormData(this);
  let res = await fetch("../api/api.php?action=add_disciplinary", { method: "POST", body: formData });
  let data = await res.json();
  alert(data.message);
  loadData();
});

async function loadData(){
  let res = await fetch("../api/api.php?action=get_disciplinary");
  let data = await res.json();
  let tbody = document.querySelector("#disciplinaryTable tbody");
  tbody.innerHTML = "";
  data.data.forEach(row => {
    tbody.innerHTML += `<tr>
      <td>${row.id}</td>
      <td>${row.employee_id}</td>
      <td>${row.case_type}</td>
      <td>${row.status}</td>
      <td>${row.date_reported}</td>
    </tr>`;
  });
}
loadData();
</script>
</body>
</html>
