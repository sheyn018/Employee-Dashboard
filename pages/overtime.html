<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overtime Management</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { background: #f4fff4; font-family: Arial, sans-serif; }
    .container { max-width: 800px; margin: 30px auto; background: #fff; padding: 20px; border-radius: 10px; }
    h2 { color: #2a7b2a; }
    input, textarea { width: 100%; padding: 8px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; }
    button { background: #2a7b2a; color: #fff; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #226622; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #e5ffe5; }
  </style>
</head>
<body>
    <!-- Nav Component -->
  <div id="navigation-container"></div>
<div class="container">
  <h2>⏰ Overtime Requests</h2>
  <form id="overtimeForm">
    <label>Employee ID</label>
    <input type="number" name="employee_id" required>
    <label>Date</label>
    <input type="date" name="ot_date" required>
    <label>Hours</label>
    <input type="number" name="hours" required>
    <label>Reason</label>
    <textarea name="reason"></textarea>
    <button type="submit">Submit Overtime</button>
  </form>

  <h3>Overtime Records</h3>
  <table id="overtimeTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Date</th>
        <th>Hours</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

  <script src="../components/navigation.js"></script>
<script>
document.getElementById("overtimeForm").addEventListener("submit", async function(e){
  e.preventDefault();
  let formData = new FormData(this);
  let res = await fetch("../api/api.php?action=add_overtime", { method: "POST", body: formData });
  let data = await res.json();
  alert(data.message);
  loadData();
});

async function loadData(){
  let res = await fetch("../api/api.php?action=get_overtime");
  let data = await res.json();
  let tbody = document.querySelector("#overtimeTable tbody");
  tbody.innerHTML = "";
  data.data.forEach(row => {
    tbody.innerHTML += `<tr>
      <td>${row.id}</td>
      <td>${row.employee_id}</td>
      <td>${row.ot_date}</td>
      <td>${row.hours}</td>
      <td>${row.status}</td>
    </tr>`;
  });
}
loadData();
</script>
</body>
</html>
