<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - HR Connect</title>
  <style>
    /* Add a rainbow animated background */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 400% 400%;
      animation: rainbowBackground 10s ease infinite;
    }

    @keyframes rainbowBackground {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 50%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 50px 20px;
      text-align: center;
    }

    header .logo {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .form-section {
      background-color: rgba(255, 255, 255, 0.8); /* Slightly transparent background */
      padding: 10px;
      border-radius: 1000px;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      display: block;
      width: 104%;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      font-size: 1.1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #loginError {
      color: red;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo"><i><b>EMPLOYEE</b></i></h1>
    </div>
  </header>

  <section class="form-section">
    <div class="container">
      <h2>Employee Login</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="loginError" style="color: red; text-align: center;"></p>
    </div>
  </section>

  <script>
    // Predefined accounts (7 employees)
    const employees = [
      { username: "employee1", password: "rex", name: "Rex Tyron" },
      { username: "employee2", password: "cross", name: "Gerardo" },
      { username: "employee3", password: "jaja", name: "Janna" },
      { username: "employee4", password: "bianca", name: "Averil" },
      { username: "employee5", password: "tin", name: "Justin" },
      { username: "employee6", password: "oliver", name: "Oliver" },
      { username: "employee7", password: "min", name: "Herminio" }
    ];

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Find the employee account with the provided username and password
      const employee = employees.find(emp => emp.username === username && emp.password === password);

      if (employee) {
        // Store the logged-in employee info in localStorage
        localStorage.setItem("loggedInEmployee", JSON.stringify(employee));

        // Redirect to the signin page
        window.location.href = "signin.html";
      } else {
        document.getElementById("loginError").textContent = "Invalid username or password!";
      }
    });
  </script>
</body>
</html>
